<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do You Love Me?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container" id="mainContainer">

    <h1 class="title">do you love me?</h1>

    <div class="buttons" id="buttonArea">
      <button class="btn btn-yes" id="btnYes" onclick="clickYes()">YES 💖</button>
      <button class="btn btn-no"  id="btnNo"  onclick="clickNo()">no 🙁</button>
    </div>

    <p class="sad-message" id="sadMessage"></p>

    <div class="cat-area">
      <img src="hm.gif" alt="Cute Cat" class="cat-gif" id="catImage" />
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
