<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YAY!! 💖</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0030, #3d0060, #1a0030);
      font-family: 'Segoe UI', cursive, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Kembang api canvas — mengisi seluruh layar di belakang */
    #fireworksCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Konten di atas canvas */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 30px;
      animation: dropIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes dropIn {
      0%   { transform: translateY(-60px) scale(0.8); opacity: 0; }
      100% { transform: translateY(0)     scale(1);   opacity: 1; }
    }

    .main-text {
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      color: #fff;
      text-shadow:
        0 0 20px #ff69b4,
        0 0 40px #ff1493,
        2px 2px 0 #c2185b;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .sub-text {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      color: #ffb3d9;
      text-shadow: 0 0 10px rgba(255,100,180,0.7);
      margin-bottom: 30px;
    }

    /* Animasi pelukan */
    .hug-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: clamp(3rem, 12vw, 6rem);
      margin: 10px 0 20px;
    }

    .hug-left  { animation: hugLeft  1.5s ease-in-out infinite alternate; display: inline-block; }
    .hug-right { animation: hugRight 1.5s ease-in-out infinite alternate; display: inline-block; }
    .hug-heart { animation: heartPop 0.8s ease-in-out infinite alternate; display: inline-block; font-size: 0.6em; }

    @keyframes hugLeft  { 0% { transform: rotate(-20deg) translateX(10px); } 100% { transform: rotate(-5deg)  translateX(-4px); } }
    @keyframes hugRight { 0% { transform: rotate(20deg)  translateX(-10px);} 100% { transform: rotate(5deg)   translateX(4px);  } }
    @keyframes heartPop { 0% { transform: scale(0.8); }                       100% { transform: scale(1.2);    } }

    /* ===== CARA PAKAI GIF PELUKAN =====
       1. Cari GIF di Giphy/Tenor: "anime hug", "cute couple hug", "chibi hug"
       2. Download & taruh di folder happy-dating/ (misal: hug.gif)
       3. Uncomment blok di bawah dan tambahkan <img> di HTML

    .hug-gif {
      width: 200px;
      border-radius: 20px;
      margin: 10px auto;
      display: block;
    }
    ================================== */

    /* Tombol kembali */
    .btn-back {
      margin-top: 20px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff69b4, #c2185b);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,105,180,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-back:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(255,105,180,0.7); }
    .btn-back:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <!-- Canvas kembang api -->
  <canvas id="fireworksCanvas"></canvas>

  <!-- Konten utama -->
  <div class="content">
    <div class="hug-area">
      <img src="llove.gif" alt="Love cat" class="hug-gif" />
    </div>

    <h1 class="main-text">I KNEW YOU WOULD SAY YES HAHA! 🎉</h1>
    <p class="sub-text">Makasih udah milih aku 💕<br>Aku sayang kamu banget!</p>

    <button class="btn-back" onclick="window.location.href='index.html'">
      Ulang lagi? 😄
    </button>
  </div>

  <script>
    // ============================================================
    //  KEMBANG API (Fireworks) — Pure JavaScript Canvas
    // ============================================================

    const canvas = document.getElementById("fireworksCanvas");
    const ctx    = canvas.getContext("2d");

    // Sesuaikan ukuran canvas dengan layar
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // ── Partikel ──────────────────────────────────────────────
    class Particle {
      constructor(x, y, color) {
        this.x     = x;
        this.y     = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        this.vx    = Math.cos(angle) * speed;
        this.vy    = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = 0.013 + Math.random() * 0.012;
        this.radius = 2 + Math.random() * 2;
        this.gravity = 0.08;
        this.trail = [];
      }

      update() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 6) this.trail.shift();

        this.vy    += this.gravity;
        this.x     += this.vx;
        this.y     += this.vy;
        this.vx    *= 0.98;
        this.alpha -= this.decay;
      }

      draw() {
        // Gambar ekor
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const a = (i / this.trail.length) * this.alpha * 0.4;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.radius * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.color}, ${a})`;
          ctx.fill();
        }

        // Gambar partikel utama
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = `rgba(${this.color}, 0.8)`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      get dead() { return this.alpha <= 0; }
    }

    // ── Roket ─────────────────────────────────────────────────
    class Rocket {
      constructor() {
        this.x     = 80 + Math.random() * (canvas.width - 160);
        this.y     = canvas.height;
        this.vy    = -(10 + Math.random() * 6);
        this.vx    = (Math.random() - 0.5) * 2;
        this.targetY = canvas.height * (0.15 + Math.random() * 0.45);
        this.exploded = false;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy *= 0.98;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur  = 12;
        ctx.shadowColor = "#fff";
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      get shouldExplode() { return this.y <= this.targetY; }
    }

    // ── Warna kembang api ─────────────────────────────────────
    const COLORS = [
      "255, 100, 180",
      "255, 200,  50",
      "100, 220, 255",
      "180, 255, 100",
      "255, 150, 100",
      "220, 100, 255",
      "255, 255, 100",
      "100, 255, 200",
    ];

    // ── State ─────────────────────────────────────────────────
    const particles = [];
    const rockets   = [];

    function explode(x, y) {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const count = 80 + Math.floor(Math.random() * 60);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // Launch roket secara acak
    function launchRocket() {
      rockets.push(new Rocket());
    }

    // Tembak roket pertama langsung
    launchRocket();

    // Tembak roket berkala (acak antara 0.6–1.4 detik)
    function scheduleNext() {
      const delay = 600 + Math.random() * 800;
      setTimeout(() => {
        launchRocket();
        scheduleNext();
      }, delay);
    }
    scheduleNext();

    // ── Loop animasi ──────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Efek trail gelap semi-transparan
      ctx.fillStyle = "rgba(26, 0, 48, 0.25)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Update & gambar roket
      for (let i = rockets.length - 1; i >= 0; i--) {
        const r = rockets[i];
        r.update();
        r.draw();
        if (r.shouldExplode) {
          explode(r.x, r.y);
          rockets.splice(i, 1);
        }
      }

      // Update & gambar partikel
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.dead) particles.splice(i, 1);
      }
    }

    animate();
  </script>
</body>
</html>
